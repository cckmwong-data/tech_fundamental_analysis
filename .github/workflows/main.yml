# Disclaimer: this is only to showcase the content of YAML file and is not executable.
# The actual one is scheduled to be in another private Github repo.

name: Financial Data Update

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    if: false  # prevents execution for showcase purposes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Extraction Script
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python scripts/extract_finance.py
